version: '3.8'

services:
  bot:
    build: .
    container_name: baileys-bot
    restart: unless-stopped
    volumes:
      - ./sessions:/app/sessions
      - ./media:/app/media
      - ./backups:/app/backups
      - ./data.db:/app/data.db
    environment:
      - NODE_ENV=production
      - TZ=Asia/Jakarta
    ports:
      - "3000:3000"
    
  # Optional: Postgres for production
  postgres:
    image: postgres:15
    container_name: baileys-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: baileys
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data:
